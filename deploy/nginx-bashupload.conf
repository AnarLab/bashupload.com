# Example: TLS + reverse proxy to Uvicorn (adjust server_name and paths).
# Include from http {} or paste inside server {}.

upstream bashupload_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name upload.example.com;

    # ssl_certificate     /etc/letsencrypt/live/upload.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/upload.example.com/privkey.pem;

    client_max_body_size 50G;
    client_body_timeout 86400s;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    send_timeout 86400s;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Stream large bodies to the app instead of buffering on disk
        proxy_request_buffering off;
        proxy_buffering off;

        proxy_pass http://bashupload_app;
    }
}
